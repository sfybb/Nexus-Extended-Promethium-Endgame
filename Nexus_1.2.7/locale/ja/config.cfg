[nexus-research-description]
planet-nexus-scanning=希少な元素が豊富な惑星を発見した。これで家に帰るという目的へまた一歩近づいた。ただし、惑星の環境が非常に過酷なため、専用の新しいスーツを開発する必要がある。
planet-nexus-scanning-Krastorio2-space-out=連邦にとって私の救助はどうやら重要ではないらしい。自力で帰り道を見つけるしかない。希少な元素が豊富な惑星を発見した。これで家に帰るという目的へまた一歩近づいた。ただし、惑星の環境が非常に過酷なため、専用の新しいスーツを開発する必要がある。
element882=なぜこの惑星がこれほど高い質量を持っているのかが分かった。かつてここに住んでいた種族は、現代の人類と同じくらい進歩しており、あらゆる装置をOmega合金で製造していた。惑星の表面はその都市も含めて完全に破壊されているが、地殻から元素「プロメチウム882」を抽出することができる。それには膨大な電力が必要になるだろう。近いうちに、自分用のワープドライブを含む先進的なマシンを構築できるはずだ。
atomacer=これらのマシンを使えば、物質を構成成分に分解し、個別に分別することができる。安全を考慮して、「光子濃縮室」は少し離れた場所に建てるべきだ。このエネルギーに満ちた液体は、生産中に一時的に極めて不安定な状態になる。マシンを爆発させたくはないからな。
matter-stabilization=クソッ、爆発しそうだ。距離を取るべきだ。不運なことに、光子流体の生産中に時折、臨界光子キューブが形成される。これらを安定化させなければ、小型原子爆弾並みの威力で爆発してしまう。この問題は後でうまく制御できるようになるといいのだが。
omega-components=ついにOmega合金を生産できるようになった。これには大量の資材が必要であり、さらに多くの光子流体、そして何よりも多くの電力が求められる。この新しい建材とその特性を利用して、より優れ、より効率的な発電方法を開発すべきだ。
fusion-power-mk2=ついに、新しくより効率的な核融合炉を完成させた。これで、増大する電力消費をカバーできるはずだ。
photon-stream-thruster=この新しいエンジンの助けがあれば、宇宙での移動がより快適になるだろう。前世代の4倍の推力を生み出し、光子流体と酸化剤を燃料として使用するため、遥かに効率的に動作する。
photon-electronics=Omegaの世代交代と優れたコンポーネントの恩恵により、ワープドライブの燃料として必要な反物質やエキゾチック物質を間もなく生産できるようになるはずだ。あとほんの小さな一歩だ。
antimatter-produktion=ついにやった。反物質とエキゾチック物質を生産するマシンだ。唯一の難点は、莫大な量の物質とエネルギーを必要とすることだ。だが今の自分なら対処できるはずだ。電網の過負荷を防ぐため、このマシンの発電系統をメインの送電網から切り離しておくべきだ。私の古い宇宙船は、891.2トンの重量に対して2501ユニットの燃料（反物質とエキゾチック物質）を必要としていた。
warp-drive-engine=今や、極めて高密度なオールトの雲を飛び越えなければならない点を除けば、星々と故郷への旅を遮るものは何もない。この密集した小惑星星雲を通り抜けるために、宇宙船の装備をしっかりと整えるべきだ。また、オールトの雲を抜けるまではワープドライブに点火しないよう注意しなければならない。星系の内部でそれを行うと、空間の歪みによって破滅的なエラーが発生する恐れがある。そして、まず両方のタイプの燃料をワープドライブに接続し、反物質とエキゾチック物質が内部タンクに入ってから初めて点火することを忘れてはならない。さもなければ、この装置が爆発するか、あるいは保護のないまま内部に閉じ込められている間に時空に深刻な事態が引き起こされる危険性がある。すでに四次元にまで達する断層の報告が上がっているのだ。
omega-module-mk1=そういえば……古い宇宙船から回収した4つのZPEコアがまだ残っていたな。新しく手に入れた研究所の計算能力を利用して、それらの量子漲落コアを再調整すべきだ。
omega-system-upgrade-v2=オメガ蓄電器がレベル 2 にアップグレードされました！
omega-system-upgrade-v3=オメガ蓄電器がレベル 3 にアップグレードされました！

