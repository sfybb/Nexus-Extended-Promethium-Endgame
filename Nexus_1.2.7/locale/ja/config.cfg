[mod-setting-description]
nexus-threat-activation=無効化すると、この拡張模組のすべてのスクリプトとコンテンツが停止します。
nt-max-shield=グローバルシールドが蓄積できるエネルギーの最大量。
nt-drill-rate=稼働中の電動掘削機1台あたり、1秒間に不安定度がどれだけ増加するかを決定します。
nt-storm-chance=不安定度が存在する場合に嵐が発生する確率の乗数。
nt-shield-regen=毎秒自動的に回復する、固定のシールドエネルギー量。
nt-shield-drain=落雷のダメージを吸収するために、どれだけのシールドエネルギーが消費されるかを決定する乗数。
nt-base-damage=不安定度 0% の状態で落雷が発生した際に与えられるダメージ。
nt-damage-inc=不安定度のパーセンテージごとに、基礎ダメージに追加される追加ダメージ量。
nt-storm-dur-base=嵐の最小継続時間（秒単位）。
nt-storm-dur-mult=現在の不安定度レベルに基づいて追加される、追加の嵐継続時間。
nt-recipe-bonus=組立機が安定化レシピを使用して生産を行う際、1秒あたりに生成されるシールドエネルギーの量。
nt-drill-interval=パフォーマンス設定：掘削機の計算を行うための tick 間隔（1-60）。数値を高くすると、メガベースでの CPU 負荷を軽減できます。

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=不安定度とシールド値の読み取り

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=現在の不安定度とシールド強度の数値を監視できます：\n1. [item=constant-combinator] 定数回路を設置します。\n2. 不安定度には [virtual-signal=nexus_charge] 信号を、シールド強度には [virtual-signal=shield_energy] 信号を選択します。\n3. 回路ネットワーク配線で接続し、データを回路網に送信します。\n\n[font=default-bold]青写真とコピーについて：[/font]\nスタビライザーはメインGUIを介してグローバルにオーバークロックされるため、スポイトツールでのコピーや青写真への保存は、レベル1（出力10%）に設定されている時のみ可能です。\n工場のレイアウトをコピーまたは計画する際は、一度「惑星ステータス」のグローバルスライダーをレベル1に戻してください！

[virtual-signal-name]
shield_energy=シールドエネルギー
nexus_charge=ネクサス不安定度
