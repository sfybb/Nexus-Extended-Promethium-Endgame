[space-location-description]
nexus=地表がはるか昔に破壊された惑星。かつて人類よりも遥かに優れた種族がここに住んでいたに違いない。少なくともこの惑星は、宇宙で最も希少な元素の1つであるプロメチウムが豊富だ。
oort-cloud=このシステム内のオールトの雲は、危険な小惑星で満ちている。正直に言って、異常なほど数が多い。あそこを突破するには非常に設備の整った船が必要だ。
sol=人類の故郷たる星系、Sol。早く家に帰って、ここでの冒険を会社に報告したくてたまらない。だが、まずは新しいワープドライブを建造しなければ。

