[nexus-research-description]
planet-nexus-scanning=我发现了一颗富含罕见元素的行星，这让我离回到家的任务又近了一步。我只需要为此开发一套全新的防护服，因为这颗行星的环境非常恶劣。
planet-nexus-scanning-Krastorio2-space-out=既然联邦显然认为对我的营救并不重要，我必须找到自己回家的路。我发现了一颗富含罕见元素的行星，这让我离回到家的任务又近了一步。我只需要为此开发一套全新的防护服，因为这颗行星的环境非常恶劣。
element882=现在我知道为什么这颗行星有这么大的质量了。曾经生活在这里的物种和现代人类一样先进，并用Omega合金建造了各种设备。这颗行星的表面完全被摧毁了，它的城市也是如此，但我可以从行星的地壳中提取882号元素钷。我只是需要大量的电力才能做到这一点。我应该很快就能建造先进的机器，包括我自己的曲率驱动器。
atomacer=有了这些机器，我可以将物质分解为其组成部分并进行分类。为了安全起见，我应该把“光子富集室”建在更远的地方。这种高能液体在生产过程中会短暂地处于高度不稳定的状态。我可不想让机器爆炸。
matter-stabilization=该死，它快要爆炸了。我应该保持距离。不幸的是，在光子液体的生产过程中有时会形成临界光子立方体。我必须稳定它们，否则它们会以小型原子弹的威力爆炸。我希望以后能解决这个问题。
omega-components=我终于可以生产Omega合金了。这将需要大量的材料，我将 need 需要更多的光子液体，最重要的是，需要更多的电力。我应该利用我全新的建筑材料及其特性，来开发一种更好、更高效的发电方法。
fusion-power-mk2=我终于完成了一个全新且更高效的核聚变反应堆。现在我应该能够满足我日益增长的电力消耗了。
photon-stream-thruster=在这一全新引擎的帮助下，我应该能够在太空中更好地旅行。它产生的推力是其前身的四倍，并且运行效率高得多，因为它使用光子液体和氧化剂作为燃料。
photon-electronics=在Omega世代和更好组件的帮助下，我应该很快就能生产反物质和奇异物质，我需要它们作为曲率驱动器的燃料。只需再迈出一小步。
antimatter-produktion=我终于做到了。一台用于生产反物质和奇异物质的机器。唯一的缺点是我需要庞大数量的物质和能量。但我现在应该能应付了。我应该将机器的发电系统与我的主电网断开，以防止电网过载。我的旧飞船在重达891.2吨时，需要2501个单位的燃料（反物质和奇异物质）。
warp-drive-engine=现在，除了必须飞越极其密集的奥尔特云之外，没有什么能阻挡我前往群星和家园的旅程。我应该把我的飞船装备好，以穿过这片密集的小行星星云。我还应该注意，直到穿过奥尔特云之后才能点燃曲率驱动器。如果我在行星系统内部这样做，由于空间的弯曲，可能会导致灾难性的错误。而且我必须记住，首先要将两种类型的燃料连接到曲率驱动器上，并且只有当反物质和奇异物质进入其内部燃料箱时才能点燃它。否则，我将冒着这东西爆炸的风险，或者在我毫无保护地困在其中时，时空发生其他糟糕的事情。此前已经有关于故障延伸到四维空间的报告了。
omega-module-mk1=这让我想起来……我的旧飞船上还有四个零点能（ZPE）核心。我应该利用实验室新获得的计算能力来重新校准它们的量子涨落核心。
omega-system-upgrade-v2=欧米伽蓄电器已升级至等级 2！
omega-system-upgrade-v3=欧米伽蓄电器已升级至等级 3！

