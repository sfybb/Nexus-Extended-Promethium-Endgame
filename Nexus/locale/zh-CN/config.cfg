[mod-setting-description]
nexus-threat-activation=如果禁用，来自此模组扩展的所有脚本和内容都将被禁用。
nt-max-shield=全球护盾可储存的最大能量。
nt-drill-rate=决定每秒每台处于激活状态的电力采矿机增加多少不稳定度。
nt-storm-chance=存在不稳定度时风暴爆发几率的乘数。
nt-shield-regen=每秒自动恢复的固定护盾能量值。
nt-shield-drain=决定消耗多少护盾能量来吸收闪电伤害的乘数。
nt-base-damage=在 0% 不稳定度下闪电击中时造成的伤害。
nt-damage-inc=在基础伤害之上，每增加一个百分点不稳定度所追加的额外伤害。
nt-storm-dur-base=风暴的最小持续时间（以秒为单位）。
nt-storm-dur-mult=基于当前不稳定度等级所追加的额外风暴持续时间。
nt-recipe-bonus=组装机使用稳定化配方时，每秒产生的护盾能量。
nt-drill-interval=性能设置：用于计算采矿机的 tick 间隔（1-60）。较高的数值可为巨型基地节省 CPU 算力。

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=读取不稳定度与护盾值

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=您可以监测当前的不稳定性和护盾强度数值：\n1. 放置一个 [item=constant-combinator] 常量运算器。\n2. 为不稳定性选择 [virtual-signal=nexus_charge] 信号，或为护盾强度选择 [virtual-signal=shield_energy] 信号。\n3. 用信号线将其连接，即可将数据传输到您的电路网络中。\n\n[font=default-bold]蓝图与复制：[/font]\n由于稳定器是通过主GUI进行全局超频的，因此只有在设为级别 1（10%功率）时，才能使用吸管工具复制或保存到蓝图中。\n请在“星球状态”中将全局滑块暂时调回级别 1，以便复制或规划您的工厂布局！

[virtual-signal-name]
shield_energy=护盾能量
nexus_charge=奈克瑟斯不稳定性
