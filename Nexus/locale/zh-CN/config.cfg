[space-location-description]
nexus=一颗表面早已被毁灭的行星。这里曾经一定生活过远比人类优越的物种，至少这颗行星富含钷元素，而钷是宇宙中最罕见的元素之一。
oort-cloud=该系统中的奥尔特云到处都是危险的小行星。老实说，数量多得异乎寻常。我需要一艘装备精良的飞船才能通过那里。
sol=人类的家园系统，Sol。我迫不及待地想回到家，告诉我们的公司我在这里的冒险。但首先我必须建造一个新的曲率驱动器。

