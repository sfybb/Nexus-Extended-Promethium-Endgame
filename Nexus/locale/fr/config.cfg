[space-location-description]
nexus=Une planète dont la surface est détruite depuis longtemps. Une espèce bien supérieure à l'humanité a dû vivre ici, au moins la planète est riche en prométhium, qui est l'un des éléments les plus rares de l'univers.
oort-cloud=Le nuage d'Oort dans ce système est plein d'astéroïdes dangereux. Un nombre inhabituellement élevé, pour être honnête. J'ai besoin d'un vaisseau très bien équipé pour traverser cet endroit.
sol=Le système d'origine de l'humanité, Sol. J'ai hâte de rentrer à la maison et de raconter nos aventures à notre entreprise. Mais je dois d'abord construire un nouveau moteur de distorsion.

