[mod-setting-description]
nexus-threat-activation=Si désactivé, tous les scripts et contenus de cette extension de mod seront désactivés.
nt-max-shield=La quantité maximale d'énergie que le bouclier global peut stocker.
nt-drill-rate=Détermine la vitesse à laquelle l'instabilité augmente par seconde par foreuse minière active.
nt-storm-chance=Multiplicateur pour la chance qu'une tempête éclate en présence d'instabilité.
nt-shield-regen=Une quantité fixe d'énergie de bouclier qui se régénère automatiquement chaque seconde.
nt-shield-drain=Multiplicateur qui détermine la quantité d'énergie du bouclier consommée pour absorber les dégâts de foudre.
nt-base-damage=Les dégâts infligés par un coup de foudre à 0% d'instabilité.
nt-damage-inc=Dégâts supplémentaires ajoutés aux dégâts de base pour chaque point de pourcentage d'instabilité.
nt-storm-dur-base=La durée minimale d'une tempête en secondes.
nt-storm-dur-mult=Temps de durée de tempête supplémentaire basé sur le niveau d'instabilité actuel.
nt-recipe-bonus=La quantité d'énergie de bouclier qu'une machine d'assemblage produit par seconde en utilisant la recette de stabilisation.
nt-drill-interval=Paramètre de performance : Intervalle de ticks (1-60) pour le calcul des foreuses. Des valeurs plus élevées économisent la puissance du processeur pour les mégabases.

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=Lire l'instabilité et le bouclier

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=Vous pouvez surveiller les valeurs actuelles de l'instabilité et de la force du bouclier :\n1. Placez un [item=constant-combinator] combinateur constant.\n2. Sélectionnez le signal [virtual-signal=nexus_charge] pour l'instabilité ou [virtual-signal=shield_energy] pour la force du bouclier.\n3. Connectez-le avec un câble pour transmettre les données dans votre réseau logique.\n\n[font=default-bold]Blueprints & copie :[/font]\nÉtant donné que les stabilisateurs sont cadencés globalement via l'interface principale, ils ne peuvent être copiés avec la pipette ou sauvegardés dans des bleus que lorsqu'ils sont réglés sur le niveau 1 (10%).\nRamenez temporairement le curseur global dans Statut de la Planète au niveau 1 pour copier ou planifier vos plans d'usine !

[virtual-signal-name]
shield_energy=Énergie du bouclier
nexus_charge=Instabilité du Nexus
