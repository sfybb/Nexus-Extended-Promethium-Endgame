photon-fuel=Carburant photonique

[nexus-research-description]
planet-nexus-scanning=J'ai trouvé une planète riche en éléments rares, ce qui me rapproche un peu plus de ma quête pour rentrer chez moi. J'ai juste besoin de développer une nouvelle combinaison pour cela, car la planète présente des conditions très difficiles.
planet-nexus-scanning-Krastorio2-space-out=Puisque mon sauvetage n'est apparemment pas important pour la Fédération, je dois trouver mon propre chemin pour rentrer chez moi. J'ai trouvé une planète riche en éléments rares, ce qui me rapproche un peu plus de ma quête pour rentrer chez moi. J'ai juste besoin de développer une nouvelle combinaison pour cela, car la planète présente des conditions très difficiles.
element882=Maintenant je sais pourquoi la planète a une masse si élevée. L'espèce qui vivait ici autrefois était aussi avancée que les humains modernes et a construit toutes sortes de dispositifs avec des alliages Omega. La surface de la planète est complètement détruite, tout comme ses villes, mais je peux extraire l'élément prométhium 882 de la croûte de la planète. J'aurai juste besoin de beaucoup d'électricité pour le faire. Je devrais bientôt être capable de construire des machines avancées, y compris mon propre moteur de distorsion.
atomacer=Avec ces machines, je peux décomposer la matière en ses composants et les trier. Je devrais construire la « Chambre d'enrichissement photonique » plus loin pour des raisons de sécurité. Ce liquide énergétique est brièvement dans un état très instable pendant la production. Je ne veux pas que la machine explose.
matter-stabilization=Merde, ça va exploser. Je devrais garder mes distances. Malheureusement, des cubes photoniques critiques se forment parfois pendant la production du liquide photonique. Je dois les stabiliser, sinon ils explosent avec la force d'une petite bombe atomique. J'espère pouvoir maîtriser ce problème plus tard.
omega-components=Je peux enfin produire l'alliage Omega. Cela nécessitera beaucoup de matériel et j'aurai besoin de plus de liquide photonique et, surtout, de plus d'électricité. Je devrais utiliser mon nouveau matériau de construction et ses propriétés pour développer une méthode de génération d'électricité meilleure et plus efficace.
fusion-power-mk2=J'ai enfin terminé un réacteur à fusion nouveau et plus efficace. Maintenant, je devrais être capable de couvrir ma consommation croissante d'électricité.
photon-stream-thruster=Grâce à ce nouveau moteur, je devrais pouvoir mieux voyager dans l'espace. Il génère quatre fois plus de poussée que son prédécesseur et fonctionne beaucoup plus efficacement car il utilise du liquide photonique et des agents oxydants comme carburant.
photon-electronics=Grâce à la génération Omega et aux meilleurs composants, je devrais bientôt être capable de produire de l'antimatière et de la matière exotique, dont j'ai besoin comme carburant pour le moteur de distorsion. Encore un petit pas.
antimatter-produktion=J'y suis enfin arrivé. Une machine pour produire de l'antimatière et de la matière exotique. Le seul inconvénient est que j'ai besoin d'une quantité énorme de matière et d'énergie. En revanche, je devrais être capable de gérer cela maintenant. Je devrais déconnecter la production d'énergie de la machine de mon réseau électrique principal pour éviter de surcharger le réseau. Mon ancien vaisseau spatial avait besoin de 2501 unités de carburant (antimatière et matière exotique) pour 891,2 tonnes.
warp-drive-engine=Maintenant, rien ne s'oppose à mon voyage vers les étoiles et ma maison, sauf que je dois voler à travers le nuage d'Oort extrêmement dense. Je devrais bien équiper mon vaisseau spatial pour traverser cette nébuleuse d'astéroïdes dense. Je devrais également veiller à ne pas allumer le moteur de distorsion avant d'avoir dépassé le nuage d'Oort. Si je fais cela à l'intérieur du système planétaire, cela pourrait entraîner des erreurs catastrophiques dues à la courbure de l'espace. Et je dois penser à connecter d'abord les deux types de carburant au moteur de distorsion und à ne l'allumer que lorsque l'antimatière et la matière exotique se trouvent dans son réservoir interne. Sinon, je cours le risque que le truc explose ou que d'autres mauvaises choses arrivent à l'espace-temps alors que je suis coincé à l'intérieur sans aucune protection. Des rapports font déjà état de défaillances s'étendant jusqu'à la 4e dimension.
omega-module-mk1=Cela me rappelle... J'ai toujours mes quatre cœurs EPM de mon ancien vaisseau spatial. Je devrais utiliser la capacité de calcul nouvellement acquise de nos laboratoires pour recalibrer leurs cœurs de fluctuation quantique.
omega-system-upgrade-v2=Accumulateurs Omega améliorés au niveau 2 !
omega-system-upgrade-v3=Accumulateurs Omega améliorés au niveau 3 !

