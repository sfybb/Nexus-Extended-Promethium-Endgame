[mod-setting-description]
nexus-threat-activation=При отключении все скрипты и содержимое этого расширения мода будут отключены.
nt-max-shield=Максимальное количество энергии, которое может хранить глобальный щит.
nt-drill-rate=Определяет, насколько быстро нестабильность увеличивается в секунду за каждый активный буровой бур.
nt-storm-chance=Множитель вероятности возникновения бури при наличии нестабильности.
nt-shield-regen=Фиксированное количество энергии щита, восстанавливающейся автоматически каждую секунду.
nt-shield-drain=Множитель, определяющий, сколько энергии щита расходуется для поглощения урона от молнии.
nt-base-damage=Урон от удара молнии при 0% нестабильности.
nt-damage-inc=Дополнительный урон, добавляемый к базовому урону за каждый процент нестабильности.
nt-storm-dur-base=Минимальная длительность бури в секундах.
nt-storm-dur-mult=Дополнительное время бури, зависящее от текущего уровня нестабильности.
nt-recipe-bonus=Количество энергии щита, которое сборщик производит в секунду, используя рецепт стабилизации.
nt-drill-interval=Настройка производительности: интервал тиков (1-60) для расчёта буров. Более высокие значения экономят процессорное время для мегабаз.

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=Показатели нестабильности и щита

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=Вы можете отслеживать текущие значения нестабильности и прочности щита:\n1. Разместите [item=constant-combinator] постоянный комбинатор.\n2. Выберите сигнал [virtual-signal=nexus_charge] для нестабильности или [virtual-signal=shield_energy] для прочности щита.\n3. Подключите его проводом, чтобы передать данные в вашу логическую сеть.\n\n[font=default-bold]Чертежи и копирование:[/font]\nПоскольку стабилизаторы разгоняются глобально через главный интерфейс, их можно скопировать пипеткой или сохранить в чертежи только тогда, когда установлен уровень 1 (10%).\nВременно верните глобальный ползунок в Статусе Планеты на уровень 1, чтобы скопировать или спланировать схемы вашей фабрики!

[virtual-signal-name]
shield_energy=Энергия щита
nexus_charge=Нестабильность Нексуса
