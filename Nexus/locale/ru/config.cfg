welcome-message=Все переводы, кроме английского и немецкого, выполнены с помощью машинного перевода! Пожалуйста, сообщайте об ошибках на странице портала модов. Большое спасибо и приятной игры с моим модом! Это уведомление можно отключить в настройках!

