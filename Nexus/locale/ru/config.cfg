omega-tank=Улучшенный резервуар для хранения жидкостей, вмещающий целых 2 миллиона тонн благодаря стабильному омега-сплаву.
zero-point-energy-engine-core=Перепрограммирование моих ZPE-ядер для генерации электрической энергии из материи.
zero-point-energy-engine-injector-down=Инжекция антипротонов
zero-point-energy-engine-injector-left=Инжекция антинейтронов
zero-point-energy-engine-injector-right=Инжекция антикварков
zero-point-energy-engine-injector-up=Инжекция антилептонов
zpe-core-limit=Увеличивает лимит ZPE-двигателей
zpe-core-efficiency=Увеличивает эффективность ZPE-двигателей (макс. = 100%)
nexus-storm-prediction=Прогноз бурь Нексуса

[space-location-name]
nexus=Нексус
sol=Система Терра
oort-cloud=Облако Оорта

[space-location-description]
nexus=Планета, поверхность которой давно разрушена. Здесь, должно быть, жил вид, превосходящий человечество. По крайней мере, планета богата прометием, который является одним из редчайших элементов во Вселенной.
oort-cloud=Облако Оорта в этой системе полно опасных астероидов. Необычайно большое количество, если честно. Мне нужен очень хорошо оснащённый корабль, чтобы пройти через него.
sol=Домашняя система людей Терра. Не могу дождаться, когда вернусь домой и расскажу нашей компании о своих приключениях здесь. Но сначала мне нужно построить новый варп-двигатель.

[item-group-name]
nexus=Нексус

[mod-name]
plasma-duct=Плазменный провод

[mod-description]
plasma-duct=Этот мод добавляет плазменные каналы, которые передают плазму между машинами.

[fuel-category-name]
photon-cube-energy=Энергия фотонного куба
photon-fuel=Фотонное топливо

[nexus-research-description]
planet-nexus-scanning=Я нашёл планету, богатую редкими элементами, которая приближает меня на шаг к моей цели - вернуться домой. Мне просто нужно разработать для неё новый защитный костюм, так как на планете очень суровые условия.
planet-nexus-scanning-Krastorio2-space-out=Раз моё спасение, по-видимому, не важно для Федерации, я должен сам найти путь домой. Я нашёл планету, богатую редкими элементами, которая приближает меня на шаг к моему квесту по возвращению домой. Мне просто нужно разработать для неё новый защитный костюм, так как на планете очень суровые условия.
element882=Теперь я знаю, почему у планеты такая высокая масса. Вид, который когда-то жил здесь, был так же развит, как и современные люди, и строил все свои устройства из омега-сплавов. Поверхность планеты полностью разрушена, как и её города, но я могу извлечь элемент прометий 882 из коры планеты. Мне просто понадобится много электричества для этого. Вскоре я смогу строить продвинутые машины, включая свой собственный варп-двигатель.
atomacer=С помощью этих машин я могу разлагать материю на компоненты и сортировать их. Мне следует построить «Камеру обогащения фотонов» подальше, для безопасности. Эта энергичная жидкость на короткое время находится в крайне нестабильном состоянии во время производства. Я не хочу, чтобы машина взорвалась.
matter-stabilization=Чёрт, сейчас взорвётся. Мне следует держаться подальше. К сожалению, при производстве фотонной жидкости иногда образуются нестабильные фотонные кубы. Я должен стабилизировать их, иначе они взорвутся с силой небольшой атомной бомбы. Надеюсь, позже я смогу справиться с этой проблемой.
omega-components=Наконец-то я могу производить омега-сплав. Для этого потребуется много материала, и мне понадобится больше фотонной жидкости и, главное, больше электричества. Мне следует использовать мой новый строительный материал и его свойства для разработки лучшего и более эффективного метода генерации электричества.
fusion-power-mk2=Я наконец завершил новый и более эффективный термоядерный реактор. Теперь я должен покрыть свой растущий расход электроэнергии.
photon-stream-thruster=С помощью этого нового двигателя я смогу лучше путешествовать в космосе. Он генерирует в четыре раза больше тяги, чем его предшественник, и работает гораздо эффективнее, поскольку использует фотонную жидкость и окислители в качестве топлива.
photon-electronics=С помощью омега-генерации и лучших компонентов я вскоре смогу производить антиматерию и экзоматерию, которые мне нужны как топливо для варп-двигателя. Ещё один маленький шаг.
antimatter-produktion=Я наконец сделал это. Машина для производства антиматерии и экзоматерии. Единственный недостаток в том, что мне нужно огромное количество сырой материи и энергии. Но теперь я должен справиться с этим. Мне следует отключить генерацию энергии машины от моей основной энергосети, чтобы не перегружать сеть. Моему старому космическому кораблю требовалась 2501 единица топлива (антиматерии и экзоматерии) на 891,2 тонны.
warp-drive-engine=Теперь ничто не стоит на пути моего путешествия к звёздам и моему дому, кроме того, что мне нужно - пролететь через чрезвычайно плотное облако Оорта. Мне следует хорошо оснастить мой космический корабль, чтобы пройти через эту плотную астероидную туманность. Мне также следует позаботиться о том, чтобы не включать варп-двигатель до тех пор, пока не пройду облако Оорта. Если я сделаю это внутри планетарной системы, это может привести к катастрофическим ошибкам из-за искривления пространства. И я должен помнить, что нужно сначала подключить оба типа топлива к варп-двигателю и включать его только тогда, когда антиматерия и экзоматерия окажутся в его внутреннем баке. В противном случае я рискую, что эта штука взорвётся или произойдут другие плохие вещи с пространством-временем, пока я нахожусь в нём без защиты.
omega-module-mk1=Это напоминает мне... У меня всё ещё есть четыре ZPE-ядра от моего старого космического корабля. Мне следует использовать недавно приобретённые вычислительные мощности моих лабораторий для перенастройки их квантово-флуктуационных ядер.
omega-system-upgrade-v2=Омега-аккумуляторы обновлены до уровня 2!
omega-system-upgrade-v3=Омега-аккумуляторы обновлены до уровня 3!

