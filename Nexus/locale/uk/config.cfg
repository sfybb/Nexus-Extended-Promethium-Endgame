[nexus-research-description]
planet-nexus-scanning=Я знайшов планету, багату на рідкісні елементи, що на крок наближає мене до мети повернутися додому. Мені просто потрібно розробити новий костюм для неї, оскільки на планеті дуже важкі умови.
planet-nexus-scanning-Krastorio2-space-out=Оскільки моє порятунок, очевидно, не важливе для Федерації, мені доведеться шукати власний шлях додому. Я знайшов планету, багату на рідкісні елементи, що на крок наближає мене до мети повернутися додому. Мені просто потрібно розробити новий костюм для неї, оскільки на планеті дуже важкі умови.
element882=Тепер я знаю, чому планета має таку велику масу. Вид, який колись жив тут, був розвинений так само, як сучасні люди, і створював різноманітні свої пристрої з омега-сплавів. Поверхня планети повністю знищена, як і її міста, але я можу видобувати елемент прометій-882 з планетарної кори. Мені просто знадобиться багато електроенергії для цього. Скоро я зможу будувати передові машини, включаючи мій власний варп-двигун.
atomacer=За допомогою цих машин я можу розщеплювати матерію на її компоненти та сортувати їх окремо. Мені слід побудувати «Камеру збагачення фотонів» подалі про всяк випадок. Ця енергетична рідина під час виробництва на короткий час перебуває у вкрай нестабільному стані. Я не хочу, щоб машина вибухнула.
matter-stabilization=Чорт, вона ось-ось вибухне. Мені слід триматися на відстані. На жаль, під час виробництва фотонної рідини іноді утворюються критичні фотонні куби. Я мушу стабілізувати їх, інакше вони вибухнуть із силою малої атомної бомби. Сподіваюся, я зможу розібратися з цією проблемою пізніше.
omega-components=Нарешті я можу виробляти омега-сплав. Для цього знадобиться багато матеріалу, більше фотонної рідини і, перш за все, більше електроенергії. Я повинен використати свій новий будівельний матеріал та його властивості, щоб розробити кращий і ефективніший метод генерації електроенергії.
fusion-power-mk2=Я нарешті завершив створення нового й ефективнішого термоядерного реактора. Тепер я зможу покрити моє зростаюче споживання електроенергії.
photon-stream-thruster=За допомогою цього нового двигуна я зможу краще подорожувати в космосі. Він генерує в чотири рази більше тяги, ніж його попередник, і працює значно ефективніше, оскільки використовує фотонну рідину та окислювачі як паливо.
photon-electronics=За допомогою генерації омега та кращих компонентів я скоро зможу виробляти антиматерію та екзотичну матерію, які потрібні мені як паливо для варп-двигуна. Ще один маленький крок.
antimatter-produktion=Я нарешті зробив це. Машина для виробництва антиматерії та екзотичної матерії. Єдиний мінус — мені потрібна колосальна кількість матерії та енергії. Але зараз я повинен із цим впоратися. Мені слід відключити генерацію енергії машини від моєї основної електромережі, щоб запобігти її перевантаженню. Моєму старому космічному кораблю потрібно було 2501 одиниця палива (антиматерія та екзотична матерія) при вазі 891,2 тонни.
warp-drive-engine=Тепер ніщо не стоїть на шляху моєї подорожі до зірок і мого дому, за винятком того, що мені потрібно пролетіти крізь надзвичайно щільну Хмару Оорта. Мені слід добре спорядити свій космічний корабель, щоб пройти крізь цю щільну астероїдну туманність. Мені також слід подбати про те, щоб не вмикати варп-двигун до виходу з Хмари Оорта. Якщо я зроблю це всередині планетарної системи, це може призвести до катастрофічних помилок через викривлення простору. І я повинен пам'ятати, що спочатку потрібно підключити обидва види палива до варп-двигуна і вмикати його лише тоді, коли антиматерія та екзотична матерія знаходяться в його внутрішньому баку. Інакше я ризикую, що ця штука вибухне або з простором-часом стануться інші погані речі, поки я застряг у ньому без захисту. Вже надходили повідомлення про збої, що сягають 4-го виміру.
omega-module-mk1=Це нагадує мені... У мене все ще є чотири ядра ZPE від мого старого космічного корабля. Я повинен використати щойно набуту обчислювальну потужність моїх лабораторій, щоб відкалібрувати їхні ядра квантових флуктуацій.
omega-system-upgrade-v2=Омега-акумулятори оновлено до рівня 2!
omega-system-upgrade-v3=Омега-акумулятори оновлено до рівня 3!

