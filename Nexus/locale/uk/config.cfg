[mod-setting-description]
nexus-threat-activation=Якщо вимкнено, усі скрипти та контент цього розширення мода будуть вимкнені.
nt-max-shield=Максимальна кількість енергії, яку може зберігати глобальний щит.
nt-drill-rate=Визначає, як швидко збільшується нестабільність за секунду на один активний буровий установщик.
nt-storm-chance=Множитель ймовірності початку бурі за наявності нестабільності.
nt-shield-regen=Фіксована кількість енергії щита, яка автоматично регенерується щосекунди.
nt-shield-drain=Множитель, що визначає, скільки енергії щита витрачається на поглинання шкоди від блискавки.
nt-base-damage=Шкода, що завдається ударом блискавки при 0% нестабільності.
nt-damage-inc=Додаткова шкода, що додається до базової шкоди за кожен відсотковий пункт нестабільності.
nt-storm-dur-base=Мінімальна тривалість бурі в секундах.
nt-storm-dur-mult=Додатковий час тривалості бурі залежно від поточного рівня нестабільності.
nt-recipe-bonus=Кількість енергії щита, яку складальний автомат виробляє за секунду за допомогою рецепта стабілізації.
nt-drill-interval=Налаштування продуктивності: Інтервал тіків (1-60) для розрахунку бурів. Вищі значення економлять потужність процесора для мегабаз.

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=Зчитування нестабільності та щита

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=Ви можете відстежувати поточні значення нестабільності та міцності щита:\n1. Розмістіть [item=constant-combinator] постійний комбінатор.\n2. Виберіть сигнал [virtual-signal=nexus_charge] для нестабільності або [virtual-signal=shield_energy] для міцності щита.\n3. Підключіть його дротом, щоб передати дані у вашу логічну мережу.\n\n[font=default-bold]Креслення та копіювання:[/font]\nОскільки стабілізатори розганяються глобально через головний інтерфейс користувача, їх можна скопіювати піпеткою або зберегти в кресленнях лише тоді, коли встановлено рівень 1 (10%).\nТимчасово поверніть глобальний повзунок у Статусі Планети на рівень 1, щоб скопіювати або спланувати розміщення вашої фабрики!

[virtual-signal-name]
shield_energy=Енергія щита
nexus_charge=Нестабільність Нексуса
