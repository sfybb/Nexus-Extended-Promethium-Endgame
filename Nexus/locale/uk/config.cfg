[space-location-description]
nexus=Планета, поверхня якої давно знищена. Тут мав жити вид, який набагато перевершував людство; принаймні планета багата на прометій, який є одним із найрідкісніших елементів у всесвіті.
oort-cloud=Хмара Оорта в цій системі сповнена небезпечних астероїдів. Чесно кажучи, їх незвично багато. Мені потрібен дуже добре обладнаний корабель, щоб пройти крізь неї.
sol=Рідна система людей, Сол. Мені не терпиться повернутися додому й розповісти нашій компанії про свої пригоди тут. Але спочатку я мушу побудувати новий варп-двигун.

