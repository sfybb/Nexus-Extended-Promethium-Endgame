[tips-and-tricks-item-description]
tipp-instabilitaet-shild=Du kannst die aktuellen Werte für Instabilität und Schildstärke überwachen:\n1. Platziere einen [item=constant-combinator] Konstant-Kombinator.\n2. Wähle das Signal [virtual-signal=nexus_charge] für die Instabilität oder [virtual-signal=shield_energy] für die Schildstärke.\n3. Verbinde ihn mit einem Kabel, um die Werte in dein Schaltungsnetzwerk zu übertragen.\n\n[font=default-bold]Blaupausen & Kopieren:[/font]\nDa die Stabilisatoren global über das Haupt-GUI übertaktet werden, können sie nur auf Stufe 1 (10%) mit der Pipette kopiert oder in Blaupausen gespeichert werden.\nStelle den globalen Regler im Planet Status kurz auf Stufe 1 zurück, um deine Layouts zu kopieren oder zu planen!

[virtual-signal-name]
shield_energy=Schildenergie
nexus_charge=Nexus-Instabilität
