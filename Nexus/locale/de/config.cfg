[space-location-description]
nexus=Ein Planet dessen Oberfläche schon lange Zerstört ist. Eine der Meschheit weit überlegenen Spezies muss hier gelebt haben, zumindest ist der Planet reich an Promethium, was zu den seltensten Elementen des Universums gehört.
oort-cloud=Die Ordische Wolke in diesem System ist voller gefährlicher Asteroiden. Sogar ungewönlich viele um erlich zu sein. Ich brauche ein sehr gut Ausgerüstetes Schiff um dort durchzukommen.
sol=Das Heimatsystem der Menschen Sol. Ich kann es kaum erwarten nach Hause zu kommen und unserer Firma von den Abenteuern hier zu erzählen. Aber dazu muss ich erstmal einen neuen Warpantrieb konstruieren.

[item-group-name]
nexus=Nexus

[mod-name]
