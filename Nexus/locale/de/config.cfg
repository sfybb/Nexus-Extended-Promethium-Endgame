[mod-setting-description]
nexus-threat-activation=Wenn deaktiviert, werden alle Skripte und Inhalte dieser Mod Erweiterung deaktiviert.
nt-max-shield=Die maximale Energiemenge, die der globale Schild speichern kann.
nt-drill-rate=Bestimmt, wie schnell die Instabilität pro Sekunde pro aktivem Bohrer ansteigt.
nt-storm-chance=Multiplikator für die Chance, dass ein Sturm ausbricht, wenn Instabilität vorhanden ist.
nt-shield-regen=Ein fester Wert für die automatische Regeneration des Schildes pro Sekunde.
nt-shield-drain=Multiplikator, der bestimmt, wie viel Schildenergie verbraucht wird, um Blitzschaden zu absorbieren.
nt-base-damage=Der Schaden eines Blitzes bei 0% Instabilität.
nt-damage-inc=Zusätzlicher Schaden, der pro Prozentpunkt Instabilität zum Basisschaden addiert wird.
nt-storm-dur-base=Die Mindestdauer eines Sturms in Sekunden.
nt-storm-dur-mult=Zusätzliche Zeit für die Sturmdauer basierend auf der aktuellen Instabilität.
nt-recipe-bonus=Gibt an, wie viel Schildenergie pro Sekunde ein Assembler mit dem entsprechenden Rezept produziert.
nt-drill-interval=Performance-Einstellung: Intervall in Ticks (1-60), in dem die Bohrer berechnet werden. Höhere Werte sparen CPU-Leistung bei Megabasen.

