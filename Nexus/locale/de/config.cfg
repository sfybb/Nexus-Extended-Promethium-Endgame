photon-fuel=Photonentreibstoff

[nexus-research-description]
planet-nexus-scanning=Ich habe einen Planeten gefunden der reich an seltenen Elementen ist und mir ihn meinem bestreben nach Hause zu kommen einen Schritt näher bringt. Ich muss nur einen neuen Anzug dafür Entwickeln, da der Planet sehr schwere Bedingungen hat.
planet-nexus-scanning-Krastorio2-space-out=Da meine Rettung für die Föderation offenbar nicht wichtig ist, muss ich meinen Weg zurück nach Hause selbst finden. Ich habe einen Planeten gefunden der reich an seltenen Elementen ist und mir ihn meinem bestreben nach Hause zu kommen einen Schritt näher bringt. Ich muss nur einen neuen Anzug dafür Entwickeln, da der Planet sehr schwere Bedingungen hat.
element882=Jetzt weiß ich warum der Planet so eine hohe Masse besitzt. Die Spezies, die hier einst gelebt hat, war so fortgeschritten wie der heutige Mensch und hat alles Mögliche ihrer Geräte mit Omegalegierungen gebaut. Die Planetenoberfläche ist zwar komplett zerstört und ihre Städte auch, aber ich kann das Element Promethium 882 aus der Planetenkruste extrahieren. Ich werde dafür nur sehr viel Strom brauchen. Damit sollte ich bald ihn der Lage sein Fortgeschrittene Maschinen bis hin zum eigenen Warpantrieb zu bauen.
atomacer=Mit diesen Maschinen kann ich Materie in seine Bestandteile zerlegen und auseinander sortiert. Ich sollte die "Photonen Anreicherungskammer" Sicherheitshalber weiter weg bauen. Diese energetische Flüssigkeit ist bei der Herstellung kurzzeitig in einem höchst Instabilen zustand. Nicht das die Maschine noch explodiert.
matter-stabilization=Mist, es explodiert gleich. Ich sollte auf Abstand gehen. Bei der Herstellung der Photonflüssigkeit entstehen leider manchmal kritische Photonenwürfel. Ich muss sie stabilisieren, ansonsten explodieren sie mit der Sprengkraft einer kleinen Atombombe. Ich hoffe, ich kann dieses Problem später in den Griff bekommen.
omega-components=Endlich kann ich die Omegalegierung herstellen. Dies wird viel Material benötigen und dazu brauche ich mehr Photonenflüssigkeit und vor allem mehr Strom. Ich sollte mein neues Baumaterial und seine Eigenschaften nutzen um eine bessere und effizientere Methode der Stromerzeugung zu entwickeln.
fusion-power-mk2=Endlich habe ich einen neuen und effizienteren Fusionsreaktor fertiggestellt. Jetzt sollte ich ihn der Lage sein meinen wachsenden Stromverbrauch zu decken.
photon-stream-thruster=Mithilfe dieses neuen Triebwerkes sollte ich besser im Weltraum Reisen können. Er erzeugt 4-mal mehr Schub als sein Vorgänger und arbeitet weitaus effizienter, da er Photonenflüssigkeit und Oxidationsmittel als Treibstoff nutzt.
photon-electronics=Mithilfe der Omegalegirung und der besseren Bauteile sollte ich nun bald ihn der Lage sein, Antimaterie und Exotische Materie herzustellen, die ich als Treibstoff für den Warpantrieb benötige. Nur noch einen kleinen Schritt.
antimatter-produktion=Endlich ich habe es geschafft. Eine Maschine zur Herstellung von Antimaterie und Exotischer Materie. Einziger Nachteil ist, dass ich eine enorme Menge Materie und Energie benötige. Aber das sollte ich jetzt auch noch schaffen. Ich sollte die Stromerzeugung dieser Maschine von meinem Hauptstromnetz trennen, um Überlastungen des Stromnetzes zu verhindern. Mein altes Raumschiff brauchte bei 891,2 Tonnen 2501 Einheiten Treibstoff ( Antimaterie und Exotische Materie ).
warp-drive-engine=Nun steht meinem Weg zu den Sternen und meinem Zuhause nichts mehr im Weg außer das ich durch die extrem dichte Ordische Wolke fliegen muss. Ich sollte mein Raumschiff gut rüsten, um durch diesen dichten Asteroidennebel zu kommen. Ich sollte außerdem darauf achten, den Warpantrieb erst nach der Ordischen Wolke zu zünden. Wenn ich, dass innerhalb des Planetensystems mache, könnte das aufgrund der Raumkrümmung zu katastrophalen Fehlern führen. Und ich muss daran denken, dass ich erst beide Treibstoffarten an den Warpantrieb anschließe und ihn erst zünde, wenn Antimaterie und Exotische Materie ihn seinem internen Tank sind. Sonst Riskiere ich noch das mir das Ding hochgeht oder andere schlimme dinge mit der Raumzeit passieren, während ich schutzlos darin feststecke. Es gab schon Berichte von Fehlern die bis ihn die 4-Dimension reichten.
omega-module-mk1=Da fällt mir ein..... Ich habe ja immer noch meine 4 ZPE Kerne aus meinem alten Raumschiff. Ich sollte die neugewonnene Rechenkapazität meiner Labore nutzen, um ihren Quantenfluktuationskern wieder neu zu kalibrieren.
omega-system-upgrade-v2=Omega Akkumulatoren auf Stufe 2 aktualisiert!
omega-system-upgrade-v3=Omega Akkumulatoren auf Stufe 3 aktualisiert!

[nexus-mod]
warning-event=WARNUNG: Kritische Energie-Anomalie auf __1__ detektiert!
