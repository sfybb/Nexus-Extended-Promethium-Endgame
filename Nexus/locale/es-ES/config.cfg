[space-location-description]
nexus=Un planeta cuya superficie fue destruida hace mucho tiempo. Una especie muy superior a la humanidad debe haber vivido aquí; al menos el planeta es rico en prometio, que es uno de los elementos más raros del universo.
oort-cloud=La nube de Oort en este sistema está llena de asteroides peligrosos. Un número inusualmente grande, para ser sincero. Necesito una nave muy bien equipada para salir de aquí.
sol=El sistema natal de la humanidad, Sol. No veo la hora de llegar a casa y contarle a nuestra empresa mis aventuras aquí. Pero primero tengo que construir un nuevo motor de distorsión.

