[nexus-research-description]
planet-nexus-scanning=He encontrado un planeta rico en elementos raros, lo que me acerca un paso más a mi misión de volver a casa. Solo necesito desarrollar un traje nuevo para él, ya que el planeta tiene condiciones muy difíciles.
planet-nexus-scanning-Krastorio2-space-out=Dado que mi rescate aparentemente no es importante para la Federación, tengo que encontrar mi propio camino de regreso a casa. He encontrado un planeta rico en elementos raros, lo que me acerca un paso más a mi misión de volver a casa. Solo necesito desarrollar un traje nuevo para él, ya que el planeta tiene condiciones muy difíciles.
element882=Ahora sé por qué el planeta tiene una masa tan alta. La especie que una vez vivió aquí era tan avanzada como los humanos modernos y construyó todo tipo de dispositivos con aleaciones Omega. la superficie del planeta está completamente destruida, al igual que sus ciudades, pero puedo extraer el elemento prometio 882 de la corteza del planeta. Solo necesitaré mucha electricidad para hacerlo. Pronto debería poder construir máquinas avanzadas, incluido mi propio motor de distorsión.
atomacer=Con estas máquinas, puedo descomponer la materia en sus componentes y clasificarlos por separado. Debería construir la "Cámara de enriquecimiento fotónico" más lejos para estar seguro. Este líquido energético se encuentra brevemente en un estado altamente inestable durante la producción. No quiero que la máquina explote.
matter-stabilization=Mierda, está a punto de explotar. Debería mantener la distancia. Desafortunadamente, a veces se forman cubos fotónicos críticos durante la producción del líquido fotónico. Tengo que estabilizarlos, de lo contrario explotarán con la fuerza de una pequeña bomba atomica. Espero poder controlar este problema más adelante.
omega-components=Por fin puedo producir la aleación Omega. Esto requerirá mucho material y necesitaré más líquido fotónico y, sobre todo, más electricidad. Debería utilizar mi nuevo material de construcción y sus propiedades para desarrollar un método mejor y más eficiente de generar electricidad.
fusion-power-mk2=Por fin he completado un reactor de fusión nuevo y más eficiente. Ahora debería ser capaz de cubrir mi creciente consumo de electricidad.
photon-stream-thruster=Con la ayuda de este nuevo motor, debería poder viajar mejor por el espacio. Genera cuatro veces más empuje que su predecesor y funciona de manera mucho más eficiente porque utiliza líquido fotónico y agentes oxidantes como combustible.
photon-electronics=Con la ayuda de la generación Omega y los mejores componentes, pronto debería ser capaz de producir antimateria y materia egzótica, que necesito como combustible para el motor de distorsión. Solo un pequeño paso más.
antimatter-produktion=Por fin lo he logrado. Una máquina para producir antimateria y materia egzótica. El único inconveniente es que necesito una cantidad enorme de materia y energía. Pero debería ser capaz de manejar eso ahora. Debería desconectar la generación de energía de la máquina de mi red eléctrica principal para evitar sobrecargar la red. Mi antigua nave espacial necesitaba 2501 unidades de combustible (antimateria y materia egzótica) para 891.2 toneladas.
warp-drive-engine=Ahora nada se interpone en el camino de mi viaje hacia las estrellas y mi hogar, excepto que tengo que volar a través de la extremadamente densa nube de Oort. Debería equipar bien mi nave espacial para atravesar esta densa nebulosa de asteroides. También debería tener cuidado de no encender el motor de distorsión hasta después de pasar la nube de Oort. Si hago eso dentro del sistema planetario, podría provocar errores catastróficos debido a la curvatura del espacio. Y tengo que acordarme de conectar ambos tipos de combustible al motor de distorsión primero y solo encenderlo cuando la antimateria y la materia egzótica estén en su tanque interno. De lo contrario, corro el riesgo de que la cosa explote o que ocurran otras cosas malas en el espacio-tiempo mientras estoy atrapado dentro sin protección. Ya ha habido informes de fallos que llegan a la cuarta dimensión.
omega-module-mk1=Eso me recuerda... Todavía tengo mis cuatro núcleos EZP de mi antigua nave espacial. Debería usar la capacidad informática recién adquirida de mis laboratorios para recalibrar sus núcleos de fluctuación cuántica.
omega-system-upgrade-v2=¡Acumuladores Omega actualizados al nivel 2!
omega-system-upgrade-v3=¡Acumuladores Omega actualizados al nivel 3!

