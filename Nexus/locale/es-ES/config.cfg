[mod-setting-description]
nexus-threat-activation=Si se desactiva, se desactivarán todos los scripts y el contenido de esta extensión del mod.
nt-max-shield=La cantidad máxima de energía que puede almacenar el escudo global.
nt-drill-rate=Determina qué tan rápido aumenta la inestabilidad por segundo por cada perforadora minera activa.
nt-storm-chance=Multiplicador de la probabilidad de que estalle una tormenta cuando hay inestabilidad.
nt-shield-regen=Una cantidad fija de energía del escudo que se regenera automáticamente cada segundo.
nt-shield-drain=Multiplicador que determina cuánta energía del escudo se consume para absorber el daño de los rayos.
nt-base-damage=El daño causado por un rayo al 0% de inestabilidad.
nt-damage-inc=Daño adicional agregado al daño base por cada punto porcentual de inestabilidad.
nt-storm-dur-base=La duración mínima de una tormenta en segundos.
nt-storm-dur-mult=Tiempo de duración de tormenta adicional basado en el nivel de inestabilidad actual.
nt-recipe-bonus=La cantidad de energía de escudo que produce una máquina de ensamblaje por segundo usando la receta de estabilización.
nt-drill-interval=Ajuste de rendimiento: Intervalo de ticks (1-60) para el cálculo de las perforadoras. Los valores más altos ahorran potencia de CPU para megabases.

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=Lectura de inestabilidad y escudo

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=Puedes monitorizar los valores actuales de inestabilidad y fuerza del escudo:\n1. Coloca un [item=constant-combinator] combinador constante.\n2. Selecciona la señal [virtual-signal=nexus_charge] para la inestabilidad o [virtual-signal=shield_energy] para la fuerza del escudo.\n3. Conéctalo con un cable para transmitir los datos a tu red de circuitos.\n\n[font=default-bold]Planos y copia:[/font]\nDado que los estabilizadores se overclockean globalmente a través de la interfaz principal, solo se pueden copiar con la pipeta o guardar en planos cuando están configurados en el nivel 1 (10%).\n¡Vuelve a colocar temporalmente el control deslizante global en el Estado del Planeta en el nivel 1 para copiar o planificar los diseños de tu fábrica!

[virtual-signal-name]
shield_energy=Energía del escudo
nexus_charge=Inestabilidad del Nexus
