[space-location-description]
nexus=Planeta, której powierzchnia została zniszczona dawno temu. Musiał tu żyć gatunek znacznie przewyższający ludzkość. Przynajmniej planeta jest bogata w promet, który jest jednym z najrzadszych pierwiastków we wszechświecie.
oort-cloud=Obłok Oorta w tym układzie jest pełen niebezpiecznych asteroid. Szczerze mówiąc, jest ich niezwykle dużo. Potrzebuję bardzo dobrze wyposażonego statku, aby się stąd wydostać.
sol=Macierzysty układ ludzkości, Sol. Nie mogę się doczekać powrotu do domu i opowiedzenia naszej firmie o moich przygodach tutaj. Ale najpierw muszę zbudować nowy napęd warp.

