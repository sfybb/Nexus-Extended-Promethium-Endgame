photon-cube-energy=Energia kostki fotonowej
photon-fuel=Paliwo fotonowe

[nexus-research-description]
planet-nexus-scanning=Znalazłem planetę bogatą w rzadkie pierwiastki, co przybliża mnie o krok do mojej misji powrotu do domu. Muszę tylko opracować dla niej nowy skafander, ponieważ na planecie panują bardzo trudne warunki.
planet-nexus-scanning-Krastorio2-space-out=Skoro mój ratunek najwyraźniej nie jest ważny dla Federacji, muszę znaleźć własną drogę powrotną do domu. Znalazłem planetę bogatą w rzadkie pierwiastki, co przybliża mnie o krok do mojej misji powrotu do domu. Muszę tylko opracować dla niej nowy skafander, ponieważ na planecie panują bardzo trudne warunki.
element882=Teraz już wiem, dlaczego planeta ma tak wielką masę. Gatunek, który kiedyś tu żył, był tak zaawansowany jak współcześni ludzie i budował wszelkiego rodzaju urządzenia ze stopów Omega. Powierzchnia planety jest całkowicie zniszczona, podobnie jak jej miasta, ale mogę wydobyć pierwiastek promet 882 ze skorupy planety. Będę do tego potrzebować mnóstwo energii elektrycznej. Wkrótce powinienem być w stanie budować zaawansowane maszyny, w tym mój własny napęd warp.
atomacer=Dzięki tym maszynom mogę rozbić materię na jej podstawowe składniki i posortować je. Na wszelki wypadek powinienem zbudować „Komorę wzbogacania fotonów” nieco dalej. Ta energetyczna ciecz podczas produkcji znajduje się przez krótką chwilę w wysoce niestabilnym stanie. Nie chcę, żeby maszyna eksplodowała.
matter-stabilization=Cholera, to zaraz wybuchnie. Powinienem trzymać się na dystans. Niestety, podczas produkcji cieczy fotonowej czasami tworzą się krytyczne kostki fotonowe. Muszę je ustabilizować, inaczej wybuchną z siłą małej bomby atomowej. Mam nadzieję, że poradzę sobie z tym problemem później.
omega-components=W końcu mogę produkować stop Omega. Wymaga to mnóstwa materiału, będę potrzebować więcej cieczy fotonowej i przede wszystkim więcej energii elektrycznej. Powinienem wykorzystać mój nowy materiał budowlany i jego właściwości, aby opracować lepszą i bardziej wydajną metodę generowania prądu.
fusion-power-mk2=W końcu ukończyłem nowy i wydajniejszy reaktor termojądrowy. Teraz powinienem być w stanie pokryć moje rosnące zużycie energii elektrycznej.
photon-stream-thruster=Z pomocą tego nowego silnika powinienem być w stanie lepiej podróżować w kosmosie. Generuje on cztery razy większy ciąg niż jego poprzednik i działa znacznie wydajniej, ponieważ jako paliwo wykorzystuje ciecz fotonową i utleniacze.
photon-electronics=Dzięki generacji Omega i lepszym komponentom wkrótce powinienem być w stanie produkować antymaterię i materię egzotyczną, których potrzebuję jako paliwa do napędu warp. Jeszcze tylko jeden mały krok.
antimatter-produktion=W końcu mi się udało. Maszyna do produkcji antymaterii i materii egzotycznej. Jedynym minusem jest to, że potrzebuję ogromnej ilości materii i energii. Ale teraz powinienem sobie z tym poradzić. Powinienem odłączyć generowanie energii maszyny od mojej głównej sieci zasilającej, aby zapobiec jej przeciążeniu. Mój stary statek kosmiczny potrzebował 2501 jednostek paliwa (antymaterii i materii egzotycznej) przy wadze 891,2 tony.
warp-drive-engine=Teraz nic nie stoi na drodze do mojej podróży do gwiazd i mojego domu, poza tym, że muszę przelecieć przez niezwykle gęsty Obłok Oorta. Powinienem dobrze wyposażyć mój statek kosmiczny, aby przedostać się przez tę gęstą mgławicę asteroid. Powinienem również uważać, aby nie uruchamiać napędu warp przed opuszczeniem Obłoku Oorta. Jeśli zrobię to wewnątrz układu planetarnego, może to doprowadzić do katastrofalnych błędów z powodu zakrzywienia przestrzeni. I muszę pamiętać, aby najpierw podłączyć oba rodzaje paliwa do napędu warp i uruchomić go dopiero wtedy, gdy antymateria i materia egzotyczna znajdą się w jego wewnętrznym zbiorniku. W przeciwnym razie ryzykuję, że to coś wybuchnie lub z czasoprzestrzenią staną się inne złe rzeczy, podczas gdy utknę w środku bez żadnej ochrony. Pojawiły się już doniesienia o awariach sięgających czwartego wymiaru.
omega-module-mk1=To mi przypomina... Wciąż mam cztery rdzenie ZPE z mojego starego statku kosmicznego. Powinienem wykorzystać nowo nabytą moc obliczeniową moich laboratoriów, aby skalibrować ich rdzenie fluktuacji kwantowych.
omega-system-upgrade-v2=Akumulatory Omega uaktualnione do poziomu 2!
omega-system-upgrade-v3=Akumulatory Omega uaktualnione do poziomu 3!

