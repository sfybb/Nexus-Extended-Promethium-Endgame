[mod-setting-description]
nexus-threat-activation=Jeśli wyłączone, wszystkie skrypty i zawartość tego rozszerzenia modyfikacji zostaną wyłączone.
nt-max-shield=Maksymalna ilość energii, jaką może przechować globalna tarcza.
nt-drill-rate=Określa, jak szybko wzrasta niestabilność na sekundę na jedno aktywne wiertło górnicze.
nt-storm-chance=Mnożnik szansy na wybuch burzy, gdy występuje niestabilność.
nt-shield-regen=Stała ilość energii tarczy, która regeneruje się automatycznie co sekundę.
nt-shield-drain=Mnożnik określający, ile energii tarczy jest zużywane na pochłonięcie obrażeń od piorunów.
nt-base-damage=Obrażenia zadawane przez uderzenie pioruna przy 0% niestabilności.
nt-damage-inc=Dodatkowe obrażenia dodawane do obrażeń podstawowych za każdy punkt procentowy niestabilności.
nt-storm-dur-base=Minimalny czas trwania burzy w sekundach.
nt-storm-dur-mult=Dodatkowy czas trwania burzy oparty na aktualnym poziomie niestabilności.
nt-recipe-bonus=Ilość energii tarczy, jaką automat montażowy produkuje na sekundę przy użyciu receptury stabilizacyjnej.
nt-drill-interval=Ustawienie wydajności: Interwał ticków (1-60) dla obliczeń wierteł. Wyższe wartości oszczędzają moc procesora dla megabaz.

