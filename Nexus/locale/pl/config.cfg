[tips-and-tricks-item-description]
tipp-instabilitaet-shild=Możesz monitorować aktualne wartości niestabilności i wytrzymałości osłony:\n1. Postaw [item=constant-combinator] kombinator stały.\n2. Wybierz sygnał [virtual-signal=nexus_charge] dla niestabilności lub [virtual-signal=shield_energy] dla wytrzymałości osłony.\n3. Podłącz go przewodem, aby przesłać te dane do swojej sieci sterowniczej.\n\n[font=default-bold]Schematy i kopiowanie:[/font]\nPonieważ stabilizatory są podkręcane globalnie za pomocą głównego interfejsu GUI, można je kopiować pipetą lub zapisywać w schematach tylko wtedy, gdy są ustawione na poziom 1 (10%).\nZmień na chwilę suwak w Statusie Planety z powrotem na poziom 1, aby skopiować lub zaplanować układy fabryki!

[virtual-signal-name]
shield_energy=Energia osłony
nexus_charge=Niestabilność Nexusa
