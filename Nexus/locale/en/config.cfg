nexus=Nexus
sol=Sol
oort-cloud=Oort cloud

[space-location-description]
nexus=A planet whose surface has long been destroyed. A species far superior to humanity must have lived here, at least the planet is rich in promethium, which is one of the rarest elements in the universe.
oort-cloud=The Oort cloud in this system is full of dangerous asteroids. An unusually large number, to be honest. I need a very well-equipped ship to get through there.
sol=The home system of humanity, Sol. I can hardly wait to get home and tell our company about my adventures here. But first I have to build a new warp drive.

[item-group-name]
nexus=Nexus

[mod-name]
plasma-duct=Plasma duct

[mod-description]
plasma-duct=This mod adds plasma conduits that transmit plasma between machines.

[fuel-category-name]
photon-cube-energy=Photon cube energy
photon-fuel=Photon fuel

[nexus-research-description]
planet-nexus-scanning=I have found a planet that is rich in rare elements and brings me one step closer to my quest to get home. I just need to develop a new suit for it, as the planet has very difficult conditions.
planet-nexus-scanning-Krastorio2-space-out=Since my rescue is apparently not important to the Federation, I have to find my own way back home. I have found a planet that is rich in rare elements and brings me one step closer to my quest to get home. I just need to develop a new suit for it, as the planet has very difficult conditions.
element882=Now I know why the planet has such a high mass. The species that once lived here was as advanced as modern humans and built all kinds of their devices with omega alloys. The planet's surface is completely destroyed and so are its cities, but I can extract the element promethium 882 from the planet's crust. I'll just need a lot of electricity to do it. I should soon be able to build advanced machines, including my own warp drive.
atomacer=With these machines, I can break matter down into its components and sort them apart. I should build the “Photon enrichment chamber” further away to be on the safe side. This energetic liquid is briefly in a highly unstable state during production. I don't want the machine to explode.
matter-stabilization=Shit, it's about to explode. I should keep my distance. Unfortunately, critical photon cubes sometimes form during the production of the photon liquid. I have to stabilize them, otherwise they explode with the force of a small atomic bomb. I hope I can get to grips with this problem later.
omega-components=I can finally produce the omega alloy. This will require a lot of material and I will need more photon liquid and, above all, more electricity. I should use my new building material and its properties to develop a better and more efficient method of generating electricity.
fusion-power-mk2=I have finally completed a new and more efficient fusion reactor. Now I should be able to cover my growing electricity consumption.
photon-stream-thruster=With the help of this new engine, I should be able to travel better in space. It generates four times more thrust than its predecessor and works far more efficiently because it uses photon liquid and oxidizing agents as fuel.
photon-electronics=With the help of the omega generation and the better components, I should soon be able to produce antimatter and exotic matter, which I need as fuel for the warp drive. Just one more small step.
antimatter-produktion=I've finally done it. A machine for producing antimatter and exotic matter. The only drawback is that I need an enormous amount of matter and energy. But I should be able to manage that now. I should disconnect the machine's power generation from my main power grid to prevent overloading the grid. My old spaceship needed 2501 units of fuel (antimatter and exotic matter) at 891.2 tons.
warp-drive-engine=Now nothing stands in the way of my journey to the stars and my home except that I have to fly through the extremely dense Oort cloud. I should equip my spaceship well to get through this dense asteroid nebula. I should also take care not to ignite the warp drive until after the Oort cloud. If I do that inside the planetary system, it could lead to catastrophic errors due to the curvature of space. And I have to remember to connect both types of fuel to the warp drive first and only ignite it when the antimatter and exotic matter are in its internal tank. Otherwise I run the risk of the thing blowing up or other bad things happening to space-time while I'm stuck in it with no protection. There have already been reports of faults reaching into the 4th dimension.
omega-module-mk1=That reminds me... I still have my four ZPE cores from my old spaceship. I should use the newly acquired computing capacity of my laboratories to recalibrate their quantum fluctuation cores.
omega-system-upgrade-v2=Omega accumulators upgraded to level 2!
omega-system-upgrade-v3=Omega accumulators upgraded to level 3!

