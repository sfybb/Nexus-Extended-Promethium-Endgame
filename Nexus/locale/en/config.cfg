[mod-setting-description]
nexus-threat-activation=If disabled, all scripts and content from this mod extension will be disabled.
nt-max-shield=The maximum amount of energy the global shield can store.
nt-drill-rate=Determines how fast instability increases per second per active mining drill.
nt-storm-chance=Multiplier for the chance of a storm breaking out when instability is present.
nt-shield-regen=A fixed amount of shield energy that regenerates automatically every second.
nt-shield-drain=Multiplier that determines how much shield energy is consumed to absorb lightning damage.
nt-base-damage=The damage dealt by a lightning strike at 0% instability.
nt-damage-inc=Additional damage added to the base damage for each percentage point of instability.
nt-storm-dur-base=The minimum duration of a storm in seconds.
nt-storm-dur-mult=Additional storm duration time based on the current instability level.
nt-recipe-bonus=The amount of shield energy an assembler produces per second using the stabilization recipe.
nt-drill-interval=Performance setting: Tick interval (1-60) for calculating drills. Higher values save CPU power for megabases.

[tips-and-tricks-item-name]
tipp-instabilitaet-shild=Read instability and shield

[tips-and-tricks-item-description]
tipp-instabilitaet-shild=You can monitor the current instability and shield strength values:\n1. Place a [item=constant-combinator] constant combinator.\n2. Select the [virtual-signal=nexus_charge] signal for instability or [virtual-signal=shield_energy] for shield strength.\n3. Connect it with a wire to transmit the data into your circuit network.\n\n[font=default-bold]Blueprints & copying:[/font]\nSince stabilizers are overclocked globally via the main GUI, they can only be copied with the pipette tool or saved into blueprints while set to tier 1 (10%).\nTweak the global slider in Planet Status back to tier 1 briefly to copy or plan your layouts!

[virtual-signal-name]
shield_energy=Shield energy
nexus_charge=Nexus instability
